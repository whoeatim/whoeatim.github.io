<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест на внимательность</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            padding: 50px;
            margin: 0;
        }
        #content {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        #scary {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: black;
        }
        #scary img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="content">
        <h1>Тест на внимательность</h1>
        <p>Нажмите кнопку ниже, чтобы начать тестирование.</p>
        <button id="startBtn">Начать тест</button>
    </div>

    <div id="scary">
        <img id="scaryImage" src="" alt="">
        <audio id="scream" autoplay loop></audio>
    </div>

    <script>
        // Коллекция страшных изображений и звуков (ЗАМЕНИТЕ НА СВОИ!)
        const scaryStuff = [
            {img: "photo1.jpg", sound: "rai.mp3"},
            {img: "photo2.jpg", sound: "rai.mp3"},
            {img: "photo3.jpg", sound: "rai.mp3"}
        ];
        
        const startBtn = document.getElementById('startBtn');
        const scaryDiv = document.getElementById('scary');
        const scaryImg = document.getElementById('scaryImage');
        const screamSound = document.getElementById('scream');
        
        let testActive = false;
        let vibrationInterval;
        
        // Бесконечная вибрация
        function startInfiniteVibration() {
            const pattern = [500, 200];
            navigator.vibrate(pattern);
            vibrationInterval = setInterval(() => {
                navigator.vibrate(pattern);
            }, 700);
        }
        
        function stopVibration() {
            clearInterval(vibrationInterval);
            navigator.vibrate(0);
        }
        
        function startTest() {
            if (testActive) return;
            testActive = true;
            
            startBtn.textContent = 'Подготовка...';
            startBtn.disabled = true;
            
            // Переход в полноэкранный режим
            document.documentElement.requestFullscreen()
                .then(() => {
                    // После успешного перехода в полноэкранный режим
                    const delay = 3000 ;
                    
                    setTimeout(() => {
                        const randomScary = scaryStuff[Math.floor(Math.random() * scaryStuff.length)];
                        
                        scaryImg.src = randomScary.img;
                        screamSound.src = randomScary.sound;
                        scaryDiv.style.display = 'block';
                        
                        if ("vibrate" in navigator) {
                            startInfiniteVibration();
                        }
                        
                        screamSound.play().catch(e => console.error("Ошибка звука:", e));
                    }, delay);
                })
                .catch(err => {
                    console.error("Ошибка полноэкранного режима:", err);
                    // Если полноэкранный режим не сработал, все равно запускаем тест
                    const delay = 3000;
                    setTimeout(showScary, delay);
                });
        }
        
        function showScary() {
            const randomScary = scaryStuff[Math.floor(Math.random() * scaryStuff.length)];
            scaryImg.src = randomScary.img;
            screamSound.src = randomScary.sound;
            scaryDiv.style.display = 'block';
            
            if ("vibrate" in navigator) {
                startInfiniteVibration();
            }
            
            screamSound.play().catch(e => console.error("Ошибка звука:", e));
        }
        
        startBtn.addEventListener('click', startTest);
    </script>
</body>
</html>
